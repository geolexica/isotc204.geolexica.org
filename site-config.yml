id: isotc204
domain: isotc204.geolexica.org
uriBase: https://isotc204.geolexica.org
title: ISO/TC 204 ITS Vocabulary
description: Authoritative vocabulary for intelligent transport systems from ISO 14812.

datasets:
  - id: isotc204
    uri: "urn:iso:std:iso:14812:*"
    gcrPackage: https://github.com/geolexica/isotc204-glossary/releases/latest/download/isotc204-full.gcr
    sourceRepo: https://github.com/geolexica/isotc204-glossary
    title: "ISO/TC 204 ITS Vocabulary"
    description: "Vocabulary for intelligent transport systems from ISO 14812"
    owner: ISO/TC 204
    color: "#d97706"

routing:
  - uri: "urn:iec:std:iec:60050:*"
    type: url
    url: "https://electropedia.org/iev/iev.nsf/display?openform&ievref={conceptId}"
    label: "IEC Electropedia"

  - uri: "https://glossarist.org/iev/*"
    type: url
    url: "https://electropedia.org/iev/iev.nsf/display?openform&ievref={conceptId}"
    label: "IEC Electropedia"

  - uri: "https://glossarist.org/isotc211/*"
    type: site
    baseUrl: "https://isotc211.geolexica.org"
    label: "ISO/TC 211 Glossary"

  - uri: "https://glossarist.org/osgeo/*"
    type: site
    baseUrl: "https://osgeo.geolexica.org"
    label: "OSGeo Lexicon"

